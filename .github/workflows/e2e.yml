name: E2E Playwright

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install streamlit sentence-transformers bertopic

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Start Streamlit app
        run: |
          nohup streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
          sleep 40

      - name: Show Streamlit log
        run: cat streamlit.log || true

      - name: Check app is reachable
        run: curl -I http://127.0.0.1:8501

      - name: Run E2E tests
        run: pytest tests/e2e/test_streamlit_app.py -m e2e -v -s
